type Provincia {
  id: Int!
  nombre: String!
  lealtad: Int!
  prosperidadEconomica: Int!
  impuestos: Int!
  conflictosInternos: Int!
  riesgoRebelion: Int
  gobernador: Gobernador
}

type Gobernador {
  id: Int!
  nombre: String!
  edad: Int!
  nivelCompetencia: Int!
  nivelCorrupcion: Int!
  tiempoCargo: Int!
  provinciaId: Int
}

type Query {
  provincias: [Provincia]
  provincia(id: Int!): Provincia
  gobernadoresLibres: [Gobernador] # <--- ESTA LÍNEA DEBE ESTAR AQUÍ
}

input CreateProvinciaInput {
  nombre: String!
  lealtad: Int!
  prosperidadEconomica: Int!
  impuestos: Int!
  conflictosInternos: Int!
  riesgoRebelion: Int
  gobernadorId: Int
}

input UpdateProvinciaInput {
  nombre: String
  lealtad: Int
  prosperidadEconomica: Int
  impuestos: Int
  conflictosInternos: Int
  riesgoRebelion: Int
  gobernadorId: Int
}

type Mutation {
  createProvincia(input: CreateProvinciaInput!): Provincia
  updateProvincia(id: Int!, input: UpdateProvinciaInput!): Provincia
  removeProvincia(id: Int!): Boolean
}